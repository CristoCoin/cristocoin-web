  <circle cx="16" cy="16" r="9.2" stroke="#D4AF37" stroke-opacity="0.35" stroke-width="0.6" stroke-dasharray="1.2 1.2"/>

  <path
    d="M20.8 10.6C19.7 9.55 18.15 9 16.45 9C12.95 9 10.2 11.75 10.2 15.95C10.2 20.15 12.95 23 16.45 23C18.15 23 19.7 22.45 20.8 21.4"
